<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSI Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* ── Sticky wrapper ── */
    .sticky-top { position: sticky; top: 0; z-index: 100; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #fff;
      padding: 14px 20px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: .3px; }
    .header-text p  { font-size: 12px; opacity: .85; margin-top: 2px; }
    .header-link-btn {
      flex-shrink: 0;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 10px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      text-decoration: none;
      white-space: nowrap;
      transition: background .2s;
    }
    .header-link-btn:hover { background: rgba(255,255,255,0.28); }
    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Date nav bar ── */
    .date-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .nav-btn {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .nav-btn:disabled { background: #d1d5db; cursor: default; }
    .nav-btn:not(:disabled):hover { background: #1e40af; }
    .date-info { flex: 1; text-align: center; }
    .date-info .day-name { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #6b7280; letter-spacing: .5px; }
    .date-info .date-num { font-size: 22px; font-weight: 800; color: #111827; line-height: 1; }
    .date-info .month    { font-size: 13px; color: #374151; margin-top: 1px; }
    .date-picker {
      flex-shrink: 0;
      padding: 6px 5px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
      max-width: 128px;
    }

    /* ── Action buttons bar ── */
    .action-bar {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #e5e7eb;
    }
    .action-btn {
      flex: 1;
      padding: 9px 4px;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 4px;
      white-space: nowrap;
      transition: all .15s;
    }
    .action-btn:hover { background: #f9fafb; color: #374151; }
    .action-btn.teal:hover   { color: #0d9488; border-bottom-color: #0d9488; }
    .action-btn.indigo:hover { color: #6366f1; border-bottom-color: #6366f1; }
    .action-btn.chart:hover  { color: #2563eb; border-bottom-color: #2563eb; }

    /* ── Cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      padding: 14px 14px 24px;
    }
    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Location card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
    }
    .card-header {
      padding: 12px 16px 10px;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
    }
    .card-header.plano     { background: #0f4c81; }
    .card-header.ftworth   { background: #7c3aed; }
    .card-header.arlington { background: #047857; }
    .card-header .sub { font-size: 11px; font-weight: 500; opacity: .8; margin-top: 1px; }

    /* ── Shift badge ── */
    .shift-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-top: 4px;
    }
    .badge-oncall { background: #fef3c7; color: #92400e; }
    .badge-24h    { background: #e0e7ff; color: #3730a3; }
    .badge-day    { background: #dcfce7; color: #166534; }
    .badge-night  { background: #1e293b; color: #e2e8f0; }

    /* ── Role rows ── */
    .roles { padding: 12px 16px 14px; }
    .role-row {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .role-row:last-child { border-bottom: none; }
    .role-label {
      flex-shrink: 0;
      width: 90px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: #9ca3af;
      padding-top: 2px;
    }
    .role-value {
      flex: 1;
      font-size: 14px;
      color: #111827;
      font-weight: 500;
      line-height: 1.4;
    }
    .role-value.empty { color: #d1d5db; font-style: italic; font-weight: 400; }
    .pill {
      display: inline-block;
      background: #f3f4f6;
      border-radius: 4px;
      padding: 1px 6px;
      margin: 1px 2px 1px 0;
      font-size: 13px;
    }

    /* ── Shift section dividers ── */
    .section-divider {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #6b7280;
      background: #f9fafb;
      padding: 5px 16px;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    /* ── Bottom sheet ── */
    .modal-sheet {
      background: #fff;
      width: 100%;
      max-width: 680px;
      border-radius: 18px 18px 0 0;
      max-height: 82vh;
      overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
    .modal-sheet.tall { max-height: 93vh; }
    .modal-handle {
      width: 36px; height: 4px;
      background: #d1d5db;
      border-radius: 99px;
      margin: 12px auto 0;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #f3f4f6;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 10;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: #111827; }
    .modal-close {
      width: 30px; height: 30px;
      border: none; background: #f3f4f6;
      border-radius: 50%; font-size: 16px;
      color: #6b7280; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { background: #e5e7eb; }

    /* ── Date range bar ── */
    .range-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      flex-wrap: wrap;
    }
    .range-bar label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .range-bar input[type="date"] {
      padding: 4px 7px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      color: #374151;
      background: #fff;
    }
    .range-reset-btn {
      margin-left: auto;
      padding: 4px 11px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #2563eb;
      cursor: pointer;
      white-space: nowrap;
    }
    .range-reset-btn:hover { background: #dbeafe; }

    /* ── Person selector ── */
    .person-section { padding: 14px 18px 4px; }
    .person-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: #9ca3af; margin-bottom: 8px;
    }
    .person-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .person-pill {
      padding: 6px 14px;
      border: 2px solid #e5e7eb;
      background: #f9fafb;
      border-radius: 99px;
      font-size: 13px; font-weight: 500;
      color: #374151; cursor: pointer;
      transition: all .15s;
    }
    .person-pill:hover { border-color: #6b7280; }
    .active-teal   { border-color: #0d9488 !important; background: #0d9488 !important; color: #fff !important; }
    .active-indigo { border-color: #6366f1 !important; background: #6366f1 !important; color: #fff !important; }

    /* ── Results ── */
    .results-section { padding: 10px 18px 20px; }
    .results-heading {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: #6b7280; margin-bottom: 10px;
    }
    .result-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .result-row.green  { background: #f0fdf4; }
    .result-row.indigo { background: #eef2ff; }
    .result-icon { font-size: 18px; flex-shrink: 0; }
    .result-date-label { font-size: 14px; font-weight: 600; color: #111827; }
    .result-day-label  { font-size: 11px; color: #6b7280; margin-top: 1px; }
    .results-empty { text-align: center; padding: 28px 16px; color: #9ca3af; font-size: 14px; }
    .no-selection  { text-align: center; padding: 28px 16px; color: #9ca3af; font-size: 14px; font-style: italic; }

    /* ── Analytics controls ── */
    .analytics-controls {
      padding: 12px 18px 10px;
      border-bottom: 1px solid #f3f4f6;
      position: sticky;
      top: 55px;
      background: #fff;
      z-index: 9;
    }
    .toggle-group {
      display: flex;
      background: #f3f4f6;
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
      margin-bottom: 10px;
    }
    .toggle-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all .15s;
    }
    .toggle-btn.active {
      background: #fff;
      color: #1e3a8a;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .month-filters { display: flex; flex-wrap: wrap; gap: 6px; }
    .month-chip {
      padding: 4px 12px;
      border: 1.5px solid #e5e7eb;
      background: #f9fafb;
      border-radius: 99px;
      font-size: 12px; font-weight: 500;
      color: #374151; cursor: pointer;
      transition: all .15s;
    }
    .month-chip.active { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; }

    /* ── Analytics legend ── */
    .analytics-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 18px 6px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #374151; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ── Charts ── */
    .charts-area { padding: 8px 14px 28px; }
    .chart-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 10px 6px;
      margin-bottom: 12px;
    }
    .chart-heading {
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  STICKY TOP: header + date bar + action bar                           -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div class="sticky-top">
  <div class="header">
    <div class="header-text">
      <h1>TSI Call Schedule</h1>
      <p id="headerSub">Texas Stroke Institute — 2026</p>
    </div>
    <button class="header-link-btn" onclick="copyLink()" title="Copy link or open in browser">
      🔗 Link
    </button>
  </div>

  <!-- Arrows now flank the date display directly -->
  <div class="date-bar">
    <button class="nav-btn" id="prevBtn" onclick="changeDate(-1)">‹</button>
    <div class="date-info">
      <div class="day-name" id="dayName"></div>
      <div class="date-num" id="dateNum"></div>
      <div class="month"   id="monthStr"></div>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="changeDate(1)">›</button>
    <input type="date" class="date-picker" id="datePicker" onchange="onPickerChange(this.value)">
  </div>

  <!-- Action buttons -->
  <div class="action-bar">
    <button class="action-btn teal"   onclick="openDaysOff()">📅 Days Off</button>
    <button class="action-btn indigo" onclick="openCallDates()">🌙 Call Dates</button>
    <button class="action-btn chart"  onclick="openAnalytics()">📊 Analytics</button>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  DAYS OFF MODAL                                                        -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="daysModal" onclick="closeDaysOff(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">📅 Weekend Days Off</span>
      <button class="modal-close" onclick="closeDaysOff()">✕</button>
    </div>
    <div class="range-bar">
      <label>From <input type="date" id="daysFrom" onchange="onDaysRangeChange()"></label>
      <label>To <input type="date" id="daysTo" onchange="onDaysRangeChange()"></label>
      <button class="range-reset-btn" onclick="resetDaysRange()">This month</button>
    </div>
    <div class="person-section">
      <div class="person-section-label">Select a person</div>
      <div class="person-grid" id="daysPersonGrid"></div>
    </div>
    <div class="results-section" id="daysResults">
      <div class="no-selection">Tap a name above to see their free weekends</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  CALL DATES MODAL                                                      -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="callModal" onclick="closeCallDates(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">🌙 Overnight Call Dates</span>
      <button class="modal-close" onclick="closeCallDates()">✕</button>
    </div>
    <div class="range-bar">
      <label>From <input type="date" id="callFrom" onchange="onCallRangeChange()"></label>
      <label>To <input type="date" id="callTo" onchange="onCallRangeChange()"></label>
      <button class="range-reset-btn" onclick="resetCallRange()">This month</button>
    </div>
    <div class="person-section">
      <div class="person-section-label">Select a person</div>
      <div class="person-grid" id="callPersonGrid"></div>
    </div>
    <div class="results-section" id="callResults">
      <div class="no-selection">Tap a name above to see their overnight call dates</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════ -->
<!--  ANALYTICS MODAL                                                       -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="analyticsModal" onclick="closeAnalytics(event)">
  <div class="modal-sheet tall" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">📊 Work Distribution</span>
      <button class="modal-close" onclick="closeAnalytics()">✕</button>
    </div>
    <div class="analytics-controls">
      <div class="toggle-group">
        <button class="toggle-btn active" id="toggleAtt" onclick="setAnalyticsMode('attending')">Attendings</button>
        <button class="toggle-btn"        id="toggleFel" onclick="setAnalyticsMode('fellow')">Fellows</button>
      </div>
      <div class="range-bar" style="margin: 0 -18px; padding: 8px 18px;">
        <label>From <input type="date" id="analytFrom" onchange="onAnalytRangeChange()"></label>
        <label>To <input type="date" id="analytTo" onchange="onAnalytRangeChange()"></label>
        <button class="range-reset-btn" onclick="resetAnalytRange()">This month</button>
      </div>
    </div>
    <div class="analytics-legend" id="analyticsLegend"></div>
    <div class="charts-area" id="chartsArea"></div>
  </div>
</div>

const SITE_URL = 'https://tiny-alpaca-8acfdd.netlify.app';
function copyLink() {
  const url = SITE_URL;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => showToast('🔗 Link copied!'));
  } else {
    // Fallback for older iOS
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); showToast('🔗 Link copied!'); } catch(e) { showToast(url); }
    document.body.removeChild(ta);
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Constants ──────────────────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const LOCATIONS = [
  { key:'Plano',     label:'Medical City Plano',     cls:'plano'     },
  { key:'FortWorth', label:'Medical City Fort Worth', cls:'ftworth'   },
  { key:'Arlington', label:'Medical City Arlington',  cls:'arlington' },
];
const ATTENDINGS  = ['Bhuva','Hansen','Kim','Venizelos','Venkatraman'];
const FELLOWS     = ['Bauknight','Beltagy','De la Garza','Roberts'];
const ATT_COLORS  = ['#3b82f6','#f97316','#10b981','#8b5cf6','#ec4899'];
const FEL_COLORS  = ['#0ea5e9','#f59e0b','#84cc16','#ef4444'];

const ALL_DATES = Object.keys(SCHEDULE.Plano).sort();

// ── Date navigation ────────────────────────────────────────────────────────
let currentIdx = (() => {
  const today = new Date().toISOString().slice(0,10);
  const i = ALL_DATES.indexOf(today);
  return i >= 0 ? i : 0;
})();

function dateKey(idx) { return ALL_DATES[idx]; }

function shiftBadge(type) {
  const map = { oncall:['On-Call','badge-oncall'], '24h':['24h (6A–6A)','badge-24h'], day:['Day Shift','badge-day'], night:['Night Shift','badge-night'] };
  const [label, cls] = map[type] || ['—','badge-oncall'];
  return `<span class="shift-badge ${cls}">${label}</span>`;
}

function pill(name) { return `<span class="pill">${name}</span>`; }

function renderCard(loc) {
  const key = dateKey(currentIdx);
  const d = SCHEDULE[loc.key][key] || {};
  const oncall    = (d.on_call||[]).map(pill).join('') || '<span class="empty">—</span>';
  const att       = d.attending   || '';
  const hem       = d.hemorrhagic || '';
  const isc       = d.ischemic    || '';
  const nightArr  = Array.isArray(d.night) ? d.night : (d.night ? [d.night] : []);
  const hasNight  = nightArr.length > 0;
  const nightHtml = nightArr.map(pill).join('');

  let rows = `<div class="role-row"><div class="role-label">On-Call</div><div class="role-value">${oncall}</div></div>`;

  if (hem || isc) {
    rows += `<div class="section-divider">Day Shift — 7A to 6P</div>`;
    if (hem) rows += `<div class="role-row"><div class="role-label">Hemorrhagic</div><div class="role-value">${hem}</div></div>`;
    if (isc) rows += `<div class="role-row"><div class="role-label">Ischemic</div><div class="role-value">${isc}</div></div>`;
    if (hasNight) {
      rows += `<div class="section-divider">Night Shift — 6P to 7A</div>`;
      rows += `<div class="role-row"><div class="role-label">Night Attending</div><div class="role-value">${nightHtml}</div></div>`;
    }
  } else {
    if (att) rows += `<div class="role-row"><div class="role-label">${hasNight?'Day Attending':'Attending'}</div><div class="role-value">${att}</div></div>`;
    if (hasNight) {
      rows += `<div class="section-divider">Night Shift — 6P to 7A</div>`;
      rows += `<div class="role-row"><div class="role-label">Night Attending</div><div class="role-value">${nightHtml}</div></div>`;
    }
  }

  return `<div class="card"><div class="card-header ${loc.cls}">${loc.label}</div><div class="roles">${rows}</div></div>`;
}

function render() {
  const key  = dateKey(currentIdx);
  const date = new Date(key+'T00:00:00');
  document.getElementById('dayName').textContent  = DAYS[date.getDay()];
  document.getElementById('dateNum').textContent  = date.getDate();
  document.getElementById('monthStr').textContent = `${MONTHS[date.getMonth()]} ${date.getFullYear()}`;
  document.getElementById('headerSub').textContent = `Texas Stroke Institute — ${MONTHS[date.getMonth()]} ${date.getFullYear()}`;
  document.getElementById('datePicker').value     = key;
  document.getElementById('prevBtn').disabled     = currentIdx === 0;
  document.getElementById('nextBtn').disabled     = currentIdx === ALL_DATES.length - 1;
  document.getElementById('grid').innerHTML       = LOCATIONS.map(renderCard).join('');
}

function changeDate(delta) {
  currentIdx = Math.max(0, Math.min(ALL_DATES.length-1, currentIdx+delta));
  render();
}
function onPickerChange(val) {
  const i = ALL_DATES.indexOf(val);
  if (i >= 0) { currentIdx = i; render(); }
}

// ── Shared helpers ─────────────────────────────────────────────────────────
function getAllNames() {
  const names = new Set();
  for (const loc of Object.keys(SCHEDULE)) {
    for (const d of Object.values(SCHEDULE[loc])) {
      (d.on_call||[]).forEach(n=>{ if(n) names.add(n); });
      (d.night||[]).forEach(n=>{ if(n) names.add(n); });
      if (d.attending)   names.add(d.attending);
      if (d.hemorrhagic) names.add(d.hemorrhagic);
      if (d.ischemic)    names.add(d.ischemic);
    }
  }
  return [...names].sort();
}

// ── Date range helpers ─────────────────────────────────────────────────────
let daysRange   = { start: null, end: null };
let callRange   = { start: null, end: null };
let analytRange = { start: null, end: null };

function currentMonthRange() {
  const key = ALL_DATES[currentIdx].slice(0, 7);
  const inMonth = ALL_DATES.filter(d => d.startsWith(key));
  return { start: inMonth[0], end: inMonth[inMonth.length - 1] };
}

function getRangeDates(range) {
  return ALL_DATES.filter(d => d >= range.start && d <= range.end);
}

function setRangeInputs(fromId, toId, range) {
  const f = document.getElementById(fromId);
  const t = document.getElementById(toId);
  f.min = t.min = ALL_DATES[0];
  f.max = t.max = ALL_DATES[ALL_DATES.length - 1];
  f.value = range.start;
  t.value = range.end;
}

// Days Off range
function resetDaysRange() {
  daysRange = currentMonthRange();
  setRangeInputs('daysFrom','daysTo', daysRange);
  if (selectedDaysPerson) renderDaysResults(selectedDaysPerson);
}
function onDaysRangeChange() {
  const f = document.getElementById('daysFrom').value;
  const t = document.getElementById('daysTo').value;
  if (f && t && f <= t) { daysRange = { start:f, end:t }; if (selectedDaysPerson) renderDaysResults(selectedDaysPerson); }
}

// Call Dates range
function resetCallRange() {
  callRange = currentMonthRange();
  setRangeInputs('callFrom','callTo', callRange);
  if (selectedCallPerson) renderCallResults(selectedCallPerson);
}
function onCallRangeChange() {
  const f = document.getElementById('callFrom').value;
  const t = document.getElementById('callTo').value;
  if (f && t && f <= t) { callRange = { start:f, end:t }; if (selectedCallPerson) renderCallResults(selectedCallPerson); }
}

// Analytics range
function resetAnalytRange() {
  analytRange = currentMonthRange();
  setRangeInputs('analytFrom','analytTo', analytRange);
  renderAnalytics();
}
function onAnalytRangeChange() {
  const f = document.getElementById('analytFrom').value;
  const t = document.getElementById('analytTo').value;
  if (f && t && f <= t) { analytRange = { start:f, end:t }; renderAnalytics(); }
}

// ── DAYS OFF ───────────────────────────────────────────────────────────────
const WEEKEND_DATES = ALL_DATES.filter(d => { const day = new Date(d+'T00:00:00').getDay(); return day===0||day===6; });

function isScheduled(name, dateStr) {
  for (const loc of Object.keys(SCHEDULE)) {
    const d = SCHEDULE[loc][dateStr]||{};
    if ((d.on_call||[]).includes(name))  return true;
    if ((d.night||[]).includes(name))    return true;
    if (d.attending===name)   return true;
    if (d.hemorrhagic===name) return true;
    if (d.ischemic===name)    return true;
  }
  return false;
}

let selectedDaysPerson = null;

function openDaysOff() {
  daysRange = currentMonthRange();
  setRangeInputs('daysFrom','daysTo', daysRange);
  document.getElementById('daysPersonGrid').innerHTML = getAllNames().map(name =>
    `<button class="person-pill${name===selectedDaysPerson?' active-teal':''}" data-name="${name}" onclick="selectDaysPerson(this.dataset.name)">${name}</button>`
  ).join('');
  document.getElementById('daysModal').classList.add('open');
  if (selectedDaysPerson) renderDaysResults(selectedDaysPerson);
}
function closeDaysOff(e) {
  if (!e || e.target===document.getElementById('daysModal'))
    document.getElementById('daysModal').classList.remove('open');
}
function selectDaysPerson(name) {
  selectedDaysPerson = name;
  document.querySelectorAll('#daysPersonGrid .person-pill').forEach(b => b.classList.toggle('active-teal', b.dataset.name===name));
  renderDaysResults(name);
}
function renderDaysResults(name) {
  const rangeWeekends = getRangeDates(daysRange).filter(d => { const day = new Date(d+'T00:00:00').getDay(); return day===0||day===6; });
  const free = rangeWeekends.filter(d => !isScheduled(name,d));
  const el = document.getElementById('daysResults');
  if (!free.length) { el.innerHTML=`<div class="results-empty">No free weekends found for <strong>${name}</strong>.</div>`; return; }
  el.innerHTML = `<div class="results-heading">${name} — ${free.length} free weekend day${free.length!==1?'s':''}</div>` +
    free.map(d => {
      const dt=new Date(d+'T00:00:00');
      return `<div class="result-row green"><div class="result-icon">🟢</div><div><div class="result-date-label">${DAYS[dt.getDay()]}, ${MONTHS[dt.getMonth()]} ${dt.getDate()}</div><div class="result-day-label">Not scheduled at any center</div></div></div>`;
    }).join('');
}

// ── CALL DATES ─────────────────────────────────────────────────────────────
let selectedCallPerson = null;

function getOvernightDates(name) {
  const overnight = new Set();
  for (const date of getRangeDates(callRange)) {
    for (const loc of Object.keys(SCHEDULE)) {
      const d = SCHEDULE[loc][date]||{};
      // Night attending shift, weekend oncall attending, or fellow on-call duty
      if (
        (d.night||[]).includes(name) ||
        (d.on_call||[]).includes(name) ||
        (d.shift_type==='oncall' && d.attending===name)
      ) {
        overnight.add(date);
        break; // date already counted, skip remaining centers
      }
    }
  }
  return [...overnight].sort();
}

function openCallDates() {
  callRange = currentMonthRange();
  setRangeInputs('callFrom','callTo', callRange);
  selectedCallPerson = null;
  const makePills = arr => arr.map(name =>
    `<button class="person-pill" data-name="${name}" onclick="selectCallPerson(this.dataset.name)">${name}</button>`
  ).join('');
  document.getElementById('callPersonGrid').innerHTML = `
    <div style="width:100%">
      <div class="person-section-label" style="margin-bottom:6px">Attendings</div>
      <div class="person-grid" style="margin-bottom:12px">${makePills(ATTENDINGS)}</div>
      <div class="person-section-label" style="margin-bottom:6px">Fellows</div>
      <div class="person-grid">${makePills(FELLOWS)}</div>
    </div>`;
  document.getElementById('callResults').innerHTML = `<div class="no-selection">Tap a name above to see their overnight call dates</div>`;
  document.getElementById('callModal').classList.add('open');
}
function closeCallDates(e) {
  if (!e || e.target===document.getElementById('callModal'))
    document.getElementById('callModal').classList.remove('open');
}
function selectCallPerson(name) {
  selectedCallPerson = name;
  document.querySelectorAll('#callPersonGrid .person-pill').forEach(b => b.classList.toggle('active-indigo', b.dataset.name===name));
  renderCallResults(name);
}
function renderCallResults(name) {
  const dates = getOvernightDates(name);
  const el = document.getElementById('callResults');
  if (!dates.length) { el.innerHTML=`<div class="results-empty">No overnight call found for <strong>${name}</strong>.</div>`; return; }
  const weeknight = dates.filter(d => ![0,5,6].includes(new Date(d+'T00:00:00').getDay()));
  const weekend   = dates.filter(d =>  [0,5,6].includes(new Date(d+'T00:00:00').getDay()));
  const makeRow = d => {
    const dt = new Date(d+'T00:00:00');
    const isWknd = [0,5,6].includes(dt.getDay());
    return `<div class="result-row indigo"><div class="result-icon">🌙</div><div>
      <div class="result-date-label">${DAYS[dt.getDay()]}, ${MONTHS[dt.getMonth()]} ${dt.getDate()}</div>
      <div class="result-day-label">${isWknd ? 'Weekend on-call' : 'Weeknight call'}</div>
    </div></div>`;
  };
  el.innerHTML =
    `<div class="results-heading">${name} — ${dates.length} overnight call date${dates.length!==1?'s':''} &nbsp;·&nbsp; ${weeknight.length} weeknight · ${weekend.length} weekend</div>` +
    dates.map(makeRow).join('');
}

// ── ANALYTICS ──────────────────────────────────────────────────────────────
let analyticsMode = 'attending';

function getAnalyticsDates() {
  return getRangeDates(analytRange);
}

function computeStats(dates) {
  const zero = arr => Object.fromEntries(arr.map(a => [a, 0]));

  // Total overnight for attendings: count unique dates where person has ANY overnight role
  // (night[] at any center, OR attending on an oncall-shift day = weekend coverage)
  const totalAttOvernight = zero(ATTENDINGS);
  for (const date of dates) {
    const seen = new Set();
    for (const loc of Object.keys(SCHEDULE)) {
      const d = SCHEDULE[loc][date] || {};
      (d.night||[]).forEach(n => { if (n in totalAttOvernight) seen.add(n); });
      if (d.shift_type==='oncall' && d.attending && d.attending in totalAttOvernight) seen.add(d.attending);
    }
    seen.forEach(n => totalAttOvernight[n]++);
  }

  // Total overnight for fellows: every date they appear in on_call[] (weekday 24h + weekend)
  const totalFelOvernight = zero(FELLOWS);

  const attStats = {
    'Total Overnight Calls':      totalAttOvernight,
    'Plano – Hemorrhagic':        zero(ATTENDINGS),
    'Plano – Ischemic':           zero(ATTENDINGS),
    'Plano – Night':              zero(ATTENDINGS),
    'Plano – Weekend Attending':  zero(ATTENDINGS),
    'Fort Worth – Day':           zero(ATTENDINGS),
    'Fort Worth – Night':         zero(ATTENDINGS),
    'Arlington – Day':            zero(ATTENDINGS),
    'Arlington – Night':          zero(ATTENDINGS),
  };
  const felStats = {
    'Total On-Call Days': totalFelOvernight,
    'Weekday On-Call':    zero(FELLOWS),
    'Weekend On-Call':    zero(FELLOWS),
  };

  const inc = (stat, key, n) => { if (n && n in stat[key]) stat[key][n]++; };

  for (const date of dates) {
    const p   = SCHEDULE.Plano[date]    || {};
    const fw  = SCHEDULE.FortWorth[date]|| {};
    const arl = SCHEDULE.Arlington[date]|| {};
    const isFriSun = [0,5,6].includes(new Date(date+'T00:00:00').getDay());
    const isSatSun = [0,6].includes(new Date(date+'T00:00:00').getDay());

    inc(attStats, 'Plano – Hemorrhagic', p.hemorrhagic);
    inc(attStats, 'Plano – Ischemic',    p.ischemic);
    (p.night||[]).forEach(n   => inc(attStats, 'Plano – Night',   n));
    (fw.night||[]).forEach(n  => inc(attStats, 'Fort Worth – Night',  n));
    (arl.night||[]).forEach(n => inc(attStats, 'Arlington – Night',   n));

    if (isSatSun) {
      inc(attStats, 'Plano – Weekend Attending', p.attending);
    }

    inc(attStats, 'Fort Worth – Day', fw.attending);
    inc(attStats, 'Arlington – Day',  arl.attending);

    // Fellows — use Plano as representative (on_call is same across all centers)
    (p.on_call||[]).forEach(f => {
      if (f in totalFelOvernight) totalFelOvernight[f]++;
      if (!isFriSun && f in felStats['Weekday On-Call']) felStats['Weekday On-Call'][f]++;
      if ( isFriSun && f in felStats['Weekend On-Call']) felStats['Weekend On-Call'][f]++;
    });
  }
  return { attStats, felStats };
}

function niceMax(v) {
  if (v <= 4)  return 4;
  if (v <= 8)  return 8;
  if (v <= 12) return 12;
  if (v <= 16) return 16;
  if (v <= 20) return 20;
  return Math.ceil(v/5)*5;
}

// Short display names for long labels
function shortLabel(name) {
  const m = { 'Venkatraman':'Venkat.', 'De la Garza':'De la G.', 'Bauknight':'Bauknight' };
  return m[name] || name;
}

function svgBarChart(people, counts, colors) {
  const W=290, H=148, ML=26, MR=6, MT=18, MB=42;
  const CW = W-ML-MR, CH = H-MT-MB;
  const maxVal = Math.max(...counts, 1);
  const nM = niceMax(maxVal);
  const n = people.length;
  const gap = 10;
  const barW = (CW - (n-1)*gap) / n;

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">`;

  // Grid lines at 0, 25%, 50%, 75%, 100%
  for (let i=0; i<=4; i++) {
    const val = nM * i / 4;
    const y = MT + CH - (val/nM)*CH;
    svg += `<line x1="${ML}" y1="${y.toFixed(1)}" x2="${ML+CW}" y2="${y.toFixed(1)}" stroke="${i===0?'#d1d5db':'#f3f4f6'}" stroke-width="${i===0?1:0.5}"/>`;
    svg += `<text x="${(ML-4).toFixed(1)}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="8" fill="#9ca3af">${Math.round(val)}</text>`;
  }

  // Bars + count labels + name labels
  counts.forEach((val, i) => {
    const x = ML + i*(barW+gap);
    const bH = val > 0 ? (val/nM)*CH : 0;
    const y = MT + CH - bH;
    const cx = (x + barW/2).toFixed(1);

    // Bar
    svg += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(bH,0).toFixed(1)}" fill="${colors[i%colors.length]}" rx="3"/>`;

    // Count above bar
    if (val > 0) svg += `<text x="${cx}" y="${(y-3).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">${val}</text>`;

    // Name below bar — rotated -40° so it fits without crowding
    const ly = (MT + CH + 7).toFixed(1);
    svg += `<text text-anchor="end" font-size="9" fill="#374151" transform="translate(${cx},${ly}) rotate(-40)">${shortLabel(people[i])}</text>`;
  });

  svg += `</svg>`;
  return svg;
}

function openAnalytics() {
  analytRange = currentMonthRange();
  setRangeInputs('analytFrom','analytTo', analytRange);
  document.getElementById('analyticsModal').classList.add('open');
  renderAnalytics();
}
function closeAnalytics(e) {
  if (!e || e.target===document.getElementById('analyticsModal'))
    document.getElementById('analyticsModal').classList.remove('open');
}
function setAnalyticsMode(mode) {
  analyticsMode = mode;
  document.getElementById('toggleAtt').classList.toggle('active', mode==='attending');
  document.getElementById('toggleFel').classList.toggle('active', mode==='fellow');
  renderAnalytics();
}

function renderAnalytics() {
  const dates = getAnalyticsDates();
  const { attStats, felStats } = computeStats(dates);

  const people = analyticsMode==='attending' ? ATTENDINGS : FELLOWS;
  const colors = analyticsMode==='attending' ? ATT_COLORS  : FEL_COLORS;
  const stats  = analyticsMode==='attending' ? attStats    : felStats;

  // Legend
  document.getElementById('analyticsLegend').innerHTML = people.map((p,i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div>${p}</div>`
  ).join('');

  // Charts — skip any category where everyone has 0
  document.getElementById('chartsArea').innerHTML = Object.entries(stats).map(([title, data]) => {
    const counts = people.map(p => data[p]||0);
    if (counts.every(c => c===0)) return '';
    return `<div class="chart-card">
      <div class="chart-heading">${title}</div>
      ${svgBarChart(people, counts, colors)}
    </div>`;
  }).join('');
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('datePicker').min = ALL_DATES[0];
document.getElementById('datePicker').max = ALL_DATES[ALL_DATES.length-1];
render();
</script>
